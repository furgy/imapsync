name: Version Check

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bump
        run: |
          # Get current version from VERSION file
          CURRENT_VERSION=$(cat VERSION)
          echo "Current version: $CURRENT_VERSION"
          
          # Get the latest tag that matches version pattern
          PREVIOUS_VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/imapsync-//' || echo "0.0.0")
          
          echo "Previous version (from tags): $PREVIOUS_VERSION"
          
          # Check if version was bumped
          if [ "$CURRENT_VERSION" = "$PREVIOUS_VERSION" ]; then
            echo "Error: Version was not bumped! Current: $CURRENT_VERSION, Previous: $PREVIOUS_VERSION"
            echo "Please bump the version in VERSION file before pushing to master"
            exit 1
          fi
          
          echo "Version bump verified: $PREVIOUS_VERSION -> $CURRENT_VERSION"
